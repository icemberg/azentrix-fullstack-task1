spring.datasource.url=jdbc:mysql://localhost:3306/${MYSQL_DATABASE:budgetdb}?useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
